<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Redefinir senha — PROMOCITY</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            padding: 1rem;
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo img { width: 72px; height: 72px; border-radius: 16px; }
        .logo h1 { color: #1d4ed8; font-size: 1.25rem; margin-top: 0.5rem; }
        .logo p { color: #64748b; font-size: 0.875rem; margin-top: 0.25rem; }

        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; color: #374151; margin-bottom: 0.375rem; font-weight: 500; }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1.5px solid #d1d5db;
            border-radius: 0.75rem;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #1d4ed8; }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background: #1d4ed8;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }
        .btn:hover { background: #1e40af; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            display: none;
        }
        .alert.success { background: #dcfce7; color: #16a34a; display: block; }
        .alert.error   { background: #fee2e2; color: #dc2626; display: block; }
        .alert.info    { background: #dbeafe; color: #1d4ed8; display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #1d4ed8;
            font-size: 0.875rem;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }

        #loading-state { text-align: center; color: #64748b; }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #e5e7eb;
            border-top-color: #1d4ed8;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <img src="imagem/promoicone.svg" alt="PROMOCITY">
        <h1>PROMOCITY</h1>
        <p>Redefinir senha</p>
    </div>

    <!-- Estado: carregando / aguardando token -->
    <div id="loading-state">
        <div class="spinner"></div>
        <p>Verificando link de recuperação...</p>
    </div>

    <!-- Formulário de nova senha -->
    <form id="reset-form" style="display:none">
        <div id="alert-box" class="alert"></div>
        <div class="form-group">
            <label for="new-password">Nova senha</label>
            <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
        </div>
        <div class="form-group">
            <label for="confirm-password">Confirmar senha</label>
            <input type="password" id="confirm-password" placeholder="Repita a nova senha" minlength="6" required>
        </div>
        <button type="submit" class="btn" id="submit-btn">Salvar nova senha</button>
    </form>

    <!-- Estado de sucesso final -->
    <div id="success-state" style="display:none">
        <div class="alert success">
            Senha atualizada com sucesso! Você já pode fazer login.
        </div>
    </div>

    <a href="index.html" class="back-link">← Voltar para o início</a>
</div>

<script>
(function () {
    'use strict';

    const SUPABASE_URL = 'https://oaxeiiuxkcsdxxzsyvyj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9heGVpaXV4a2NzZHh4enN5dnlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTQ1ODAsImV4cCI6MjA4NzI3MDU4MH0.35BvFJIkTFVgUCv2epGcPJyoVlJr40P3pNLHfs1AOpc';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
            autoRefreshToken: true,
            persistSession: true,
            detectSessionInUrl: true
        }
    });

    const loadingEl   = document.getElementById('loading-state');
    const formEl      = document.getElementById('reset-form');
    const alertBox    = document.getElementById('alert-box');
    const successEl   = document.getElementById('success-state');
    const submitBtn   = document.getElementById('submit-btn');
    const newPassEl   = document.getElementById('new-password');
    const confirmEl   = document.getElementById('confirm-password');

    function showAlert(msg, type) {
        alertBox.textContent = msg;
        alertBox.className = 'alert ' + type;
    }

    function hideAlert() {
        alertBox.className = 'alert';
    }

    // O Supabase JS detecta automaticamente o hash com o token de recovery
    // e dispara o evento PASSWORD_RECOVERY.
    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
            // Token válido: mostrar formulário
            loadingEl.style.display = 'none';
            formEl.style.display = 'block';
        } else if (event === 'SIGNED_IN' && session) {
            // Sessão ativa por outro motivo (ex.: já estava logado): redirecionar
            const params = new URLSearchParams(window.location.search);
            if (!params.has('type') && !window.location.hash.includes('type=recovery')) {
                window.location.href = 'index.html';
            }
        }
    });

    // Timeout: se em 5 segundos nenhum evento disparar, link inválido/expirado
    const tokenTimeout = setTimeout(() => {
        loadingEl.innerHTML = '<div class="alert error" style="display:block">Link inválido ou expirado. Solicite um novo e-mail de recuperação.</div>';
    }, 5000);

    supabase.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY') clearTimeout(tokenTimeout);
    });

    // Envio do formulário
    formEl.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideAlert();

        const newPass     = newPassEl.value.trim();
        const confirmPass = confirmEl.value.trim();

        if (newPass.length < 6) {
            showAlert('A senha deve ter pelo menos 6 caracteres.', 'error');
            return;
        }
        if (newPass !== confirmPass) {
            showAlert('As senhas não coincidem.', 'error');
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Salvando...';

        try {
            const { error } = await supabase.auth.updateUser({ password: newPass });
            if (error) throw error;

            formEl.style.display = 'none';
            successEl.style.display = 'block';

            // Redireciona após 3 s
            setTimeout(() => { window.location.href = 'index.html'; }, 3000);
        } catch (err) {
            showAlert(err.message || 'Erro ao atualizar a senha. Tente novamente.', 'error');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Salvar nova senha';
        }
    });
})();
</script>
</body>
</html>
