<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Redefinir Senha - PROMOCITY</title>
    <link rel="icon" type="image/png" href="imagem/promologo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-primary, #f1f5f9);
            padding: 1rem;
        }
        .reset-card {
            background: #fff;
            border-radius: 1.25rem;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .reset-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .5rem;
        }
        .reset-logo img { width: 56px; height: 56px; object-fit: contain; }
        .reset-logo h1 { font-size: 1.1rem; font-weight: 700; color: #1d4ed8; margin: 0; }
        .reset-logo p  { font-size: .85rem; color: #64748b; margin: 0; }
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-group i {
            position: absolute;
            left: .9rem;
            color: #94a3b8;
            font-size: .9rem;
        }
        .input-group input {
            width: 100%;
            padding: .75rem .9rem .75rem 2.5rem;
            border: 1.5px solid #e2e8f0;
            border-radius: .75rem;
            font-size: .95rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
            box-sizing: border-box;
        }
        .input-group input:focus { border-color: #1d4ed8; }
        .btn-primary {
            background: #1d4ed8;
            color: #fff;
            border: none;
            border-radius: .75rem;
            padding: .85rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            transition: background .2s, opacity .2s;
        }
        .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
        .btn-primary:hover:not(:disabled) { background: #1e40af; }
        .feedback {
            font-size: .85rem;
            padding: .6rem .9rem;
            border-radius: .6rem;
            display: none;
        }
        .feedback.error   { background: #fee2e2; color: #b91c1c; display: block; }
        .feedback.success { background: #dcfce7; color: #15803d; display: block; }
        .back-link {
            text-align: center;
            font-size: .85rem;
            color: #64748b;
        }
        .back-link a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="reset-logo">
            <img src="imagem/promoicone.svg" alt="PROMOCITY">
            <h1>PROMOCITY</h1>
            <p>Redefinição de senha</p>
        </div>

        <!-- Estado: carregando token -->
        <div id="state-loading" style="text-align:center;color:#64748b;font-size:.9rem;">
            <i class="fas fa-spinner fa-spin"></i> Verificando link...
        </div>

        <!-- Estado: formulário de nova senha -->
        <form id="reset-form" style="display:none;flex-direction:column;gap:1rem;">
            <p style="margin:0;font-size:.9rem;color:#475569;">Digite sua nova senha abaixo.</p>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="new-password" placeholder="Nova senha (mín. 6 caracteres)" minlength="6" required autocomplete="new-password">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirm-password" placeholder="Confirmar nova senha" minlength="6" required autocomplete="new-password">
            </div>
            <div id="form-feedback" class="feedback"></div>
            <button type="submit" class="btn-primary" id="submit-btn">
                <i class="fas fa-check"></i> Salvar nova senha
            </button>
        </form>

        <!-- Estado: sucesso -->
        <div id="state-success" style="display:none;text-align:center;flex-direction:column;gap:1rem;align-items:center;">
            <div style="font-size:2.5rem;">✅</div>
            <p style="margin:0;font-weight:600;color:#15803d;">Senha alterada com sucesso!</p>
            <p style="margin:0;font-size:.85rem;color:#64748b;">Você será redirecionado para o login.</p>
        </div>

        <!-- Estado: link inválido/expirado -->
        <div id="state-error" style="display:none;text-align:center;flex-direction:column;gap:1rem;align-items:center;">
            <div style="font-size:2.5rem;">⚠️</div>
            <p style="margin:0;font-weight:600;color:#b91c1c;">Link inválido ou expirado.</p>
            <p style="margin:0;font-size:.85rem;color:#64748b;">Solicite um novo link de redefinição de senha.</p>
        </div>

        <div class="back-link">
            <a href="index.html"><i class="fas fa-arrow-left"></i> Voltar ao login</a>
        </div>
    </div>

    <script>
    const SUPABASE_URL = 'https://oaxeiiuxkcsdxxzsyvyj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9heGVpaXV4a2NzZHh4enN5dnlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTQ1ODAsImV4cCI6MjA4NzI3MDU4MH0.35BvFJIkTFVgUCv2epGcPJyoVlJr40P3pNLHfs1AOpc';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false }
    });

    function show(id) {
        ['state-loading', 'reset-form', 'state-success', 'state-error'].forEach(s => {
            const el = document.getElementById(s);
            if (!el) return;
            el.style.display = (s === id) ? (s === 'reset-form' ? 'flex' : (s === 'state-success' || s === 'state-error' ? 'flex' : 'block')) : 'none';
        });
    }

    function setFeedback(msg, type) {
        const el = document.getElementById('form-feedback');
        el.textContent = msg;
        el.className = 'feedback ' + type;
    }

    async function init() {
        // Supabase envia o token de recovery como fragment (#access_token=...&type=recovery)
        // O SDK v2 detecta automaticamente e emite o evento PASSWORD_RECOVERY
        const { data: { session }, error } = await supabase.auth.getSession();

        // Tenta extrair token do hash manualmente (caso o SDK não detecte em alguns browsers)
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const type = params.get('type');
        const accessToken = params.get('access_token');
        const refreshToken = params.get('refresh_token');

        if (type === 'recovery' && accessToken) {
            // Define a sessão a partir do token do link
            const { error: sessionErr } = await supabase.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken || ''
            });
            if (sessionErr) {
                show('state-error');
                return;
            }
            show('reset-form');
            return;
        }

        // Verifica se o SDK já restaurou a sessão (recovery)
        if (session && !error) {
            show('reset-form');
            return;
        }

        show('state-error');
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPass = document.getElementById('new-password').value;
        const confirmPass = document.getElementById('confirm-password').value;
        const btn = document.getElementById('submit-btn');

        if (newPass.length < 6) {
            setFeedback('A senha deve ter pelo menos 6 caracteres.', 'error');
            return;
        }
        if (newPass !== confirmPass) {
            setFeedback('As senhas não coincidem.', 'error');
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
        setFeedback('', '');

        try {
            const { error } = await supabase.auth.updateUser({ password: newPass });
            if (error) throw error;

            show('state-success');
            setTimeout(() => { window.location.href = 'index.html'; }, 2500);
        } catch (err) {
            setFeedback(err.message || 'Erro ao salvar senha. Tente novamente.', 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> Salvar nova senha';
        }
    });

    init();
    </script>
</body>
</html>
